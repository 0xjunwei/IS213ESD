version: '3.8'

services:
  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - my-shared-network

  consumer:
    build: .
    command: python -u -m consumers.consumer
    environment:
      - PYTHONPATH=/app
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: unless-stopped
    mem_limit: 256m
    networks:
      - my-shared-network

  analytics:
    build: .
    command: python -u analytics/analytics_api.py
    ports:
      - "5002:5001"
    environment:
      - PYTHONPATH=/app
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - my-shared-network

networks:
  my-shared-network:
    external: true
